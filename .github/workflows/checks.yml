name: checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    name: shellcheck + palette tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck the installer and tests
        run: shellcheck install.sh tests/*.sh

      - name: Run the accent-palette test suite
        run: bash tests/test_accent_palettes.sh

      - name: Validate the theme RONs
        run: bash tests/test_theme_rons.sh

      - name: Run the installer integration test
        run: bash tests/test_install.sh
